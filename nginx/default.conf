server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Vue SPA
    root /var/www/frontend;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        image/svg+xml font/woff2;

    # Frontend static assets (cache aggressively)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        root /var/www/frontend;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Laravel API — proxy via FastCGI to php-fpm
    location /api {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param DOCUMENT_ROOT   /var/www/html/public;
        include fastcgi_params;

        fastcgi_connect_timeout  60s;
        fastcgi_send_timeout     120s;
        fastcgi_read_timeout     120s;
        fastcgi_buffer_size      128k;
        fastcgi_buffers          4 256k;

        fastcgi_hide_header X-Powered-By;
    }

    # Laravel public storage (uploaded files)
    location /storage {
        alias /var/www/html/public/storage;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Vue SPA — all other routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
        access_log off;
    }
}
