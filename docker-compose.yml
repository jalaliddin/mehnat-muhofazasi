services:

  # ─── MySQL ────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: muhofaza_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-muhofaza}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - muhofaza_net

  # ─── Laravel (PHP-FPM) ────────────────────────────────
  app:
    build:
      context: ./backend/muhofaza
      dockerfile: Dockerfile
    container_name: muhofaza_app
    restart: unless-stopped
    env_file:
      - ./backend/muhofaza/.env.docker
    environment:
      DB_HOST: mysql
      DB_DATABASE: ${DB_DATABASE:-muhofaza}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - muhofaza_net

  # ─── Nginx + Vue SPA ─────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: muhofaza_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - app_storage:/var/www/html/storage:ro
    depends_on:
      - app
    networks:
      - muhofaza_net

# ─── Volumes ──────────────────────────────────────────
volumes:
  mysql_data:
  app_storage:

# ─── Networks ─────────────────────────────────────────
networks:
  muhofaza_net:
    driver: bridge
